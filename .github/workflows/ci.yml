name: Pull Request Validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  check-paths:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # Required for push events; pull_request events use the GitHub API directly
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'push'
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!(docs/**)'

  unit-tests-windows:
    name: Windows Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-windows2025-16
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap

      - name: Unit Tests
        run: build.bat test --test-suite=unit
        shell: cmd

  unit-tests-linux:
    name: Linux Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-ubuntu24-16
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap
        
      - name: Unit Tests
        run: ./build.sh test --test-suite=unit

  integration-tests-windows:
    name: Windows Integration Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-windows2025-16
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap

      - name: Build Redistributable Artifacts
        run: build.bat redistribute
        shell: cmd

      - name: Integration Tests
        run: build.bat test --test-suite=integration
        shell: cmd

  integration-tests-linux:
    name: Linux Integration Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-ubuntu24-16
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap

      - name: Build Redistributable Artifacts
        run: ./build.sh redistribute

      - name: Integration Tests
        run: ./build.sh test --test-suite=integration

  aot-tests-windows:
    name: AOT Compatibility Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-windows2025-16
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap

      - name: AOT Compatibility Tests
        run: build.bat test --test-suite=aot_compatibility
        shell: cmd

  build-verification-linux:
    name: Build Verification Tests
    needs: [check-paths]
    runs-on:
      group: elastic-otel-dotnet
      labels: elastic-otel-dotnet-ubuntu24-16
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/workflows/bootstrap

      - name: Build Redistributable Artifacts
        run: ./build.sh redistribute

      - name: Build Verification Tests
        run: ./build.sh test --test-suite=build_verification